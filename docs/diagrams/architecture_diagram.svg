<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .small { font: 18px Arial, sans-serif; fill: #334155; }
      .box { stroke: #2563eb; stroke-width: 3; rx: 18; }
      .arrow { stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1400" height="700" fill="#f8fafc"/>
  <text x="700" y="62" text-anchor="middle" class="title">AI-Enhanced CRM System Architecture</text>

  <rect x="60" y="245" width="250" height="150" class="box" fill="#dbeafe"/>
  <text x="185" y="295" text-anchor="middle" class="label">User Browser</text>
  <text x="185" y="335" text-anchor="middle" class="small">Manager or Agent</text>
  <text x="185" y="365" text-anchor="middle" class="small">Protected CRM workspace</text>

  <rect x="400" y="245" width="270" height="150" class="box" fill="#e0f2fe"/>
  <text x="535" y="295" text-anchor="middle" class="label">React Frontend</text>
  <text x="535" y="335" text-anchor="middle" class="small">Vite + Tailwind CSS</text>
  <text x="535" y="365" text-anchor="middle" class="small">Axios bearer-token client</text>

  <rect x="760" y="245" width="270" height="150" class="box" fill="#dcfce7"/>
  <text x="895" y="295" text-anchor="middle" class="label">FastAPI Backend</text>
  <text x="895" y="335" text-anchor="middle" class="small">REST routes + JWT RBAC</text>
  <text x="895" y="365" text-anchor="middle" class="small">Business services</text>

  <rect x="1120" y="245" width="220" height="150" class="box" fill="#fef3c7"/>
  <text x="1230" y="295" text-anchor="middle" class="label">SQLite</text>
  <text x="1230" y="335" text-anchor="middle" class="small">SQLAlchemy ORM</text>
  <text x="1230" y="365" text-anchor="middle" class="small">Persistent CRM data</text>

  <line x1="310" y1="320" x2="390" y2="320" class="arrow"/>
  <line x1="670" y1="320" x2="750" y2="320" class="arrow"/>
  <line x1="1030" y1="320" x2="1110" y2="320" class="arrow"/>

  <rect x="720" y="500" width="250" height="125" class="box" fill="#ede9fe"/>
  <text x="845" y="545" text-anchor="middle" class="label">AI Service</text>
  <text x="845" y="580" text-anchor="middle" class="small">Rule-based fallback</text>
  <text x="845" y="608" text-anchor="middle" class="small">Optional OpenAI / Gemini</text>

  <rect x="1040" y="500" width="250" height="125" class="box" fill="#fee2e2"/>
  <text x="1165" y="545" text-anchor="middle" class="label">SMTP Service</text>
  <text x="1165" y="580" text-anchor="middle" class="small">Email notifications</text>
  <text x="1165" y="608" text-anchor="middle" class="small">Safe delivery logging</text>

  <line x1="850" y1="395" x2="845" y2="490" class="arrow"/>
  <line x1="940" y1="395" x2="1125" y2="490" class="arrow"/>
</svg>
