services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: sqlite:////data/crm.db
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY before starting Docker Compose}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      AI_PROVIDER: ${AI_PROVIDER:-rule_based}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      ENABLE_MESSAGING: ${ENABLE_MESSAGING:-false}
      MESSAGING_PLATFORM: ${MESSAGING_PLATFORM:-smtp}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_TO_EMAIL: ${SMTP_TO_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    ports:
      - "8000:8000"
    volumes:
      - crm_data:/data

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  crm_data:
